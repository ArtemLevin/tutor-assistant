name: PR 14 bootstrap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-storage:
    if: github.head_ref == 'perf/maintenance-critical-section' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply storage and maintenance patch
        run: python .github/scripts/apply_pr14_storage.py
      - name: Format patched Python
        run: |
          python -m pip install --quiet 'ruff>=0.9,<1'
          ruff format src tests
          ruff check src tests --fix
      - name: Validate Python syntax
        run: python -m compileall -q src tests
      - name: Commit generated changes
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src tests .github/workflows/windows-content.yml
          git commit -m 'Implement incremental maintenance critical sections'
          git push origin HEAD:${{ github.head_ref }}
