name: PR 12 lint diagnostics

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: python -m pip install --quiet "ruff>=0.9,<1"
      - name: Collect lint report
        id: lint
        shell: bash
        run: |
          set +e
          ruff check . --output-format=json > ruff-report.json
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: pr12-ruff-report
          path: ruff-report.json
      - name: Enforce lint
        if: steps.lint.outputs.status != '0'
        run: exit 1
