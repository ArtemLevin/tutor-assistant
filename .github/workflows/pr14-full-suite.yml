name: PR 14 full suite

on:
  pull_request:
    branches:
      - main

jobs:
  full-suite:
    if: github.head_ref == 'perf/maintenance-critical-section'
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: python -m pip install uv
      - name: Install dependencies
        run: uv sync --extra desktop --group dev
      - name: Full test suite
        run: uv run pytest --junitxml=full-pytest-report.xml
      - name: Upload full test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr14-full-pytest-report
          path: full-pytest-report.xml
          if-no-files-found: ignore
