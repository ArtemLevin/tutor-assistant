name: PR 14 lint diagnostics

on:
  pull_request:
    branches:
      - main

jobs:
  lint-report:
    if: github.head_ref == 'perf/maintenance-critical-section'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: python -m pip install --quiet 'ruff>=0.9,<1'
      - name: Collect lint report
        shell: bash
        run: |
          set +e
          ruff check . --output-format=json > ruff-report.json
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr14-ruff-report
          path: ruff-report.json
