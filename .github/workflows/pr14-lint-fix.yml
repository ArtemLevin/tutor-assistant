name: PR 14 lint fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lint-fix:
    if: github.head_ref == 'perf/maintenance-critical-section' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Fix long SQL projection
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/tutor_assistant/content/repository.py')
          text = path.read_text(encoding='utf-8')
          old = '                    "a.size_bytes, a.sha256, a.created_at, a.updated_at, a.deleted_at, a.file_mtime_ns, a.last_verified_at "\n'
          new = (
              '                    "a.size_bytes, a.sha256, a.created_at, a.updated_at, "\n'
              '                    "a.deleted_at, a.file_mtime_ns, a.last_verified_at "\n'
          )
          if text.count(old) != 1:
              raise SystemExit('expected SQL projection not found exactly once')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Verify lint
        run: |
          python -m pip install --quiet 'ruff>=0.9,<1'
          ruff check .
      - name: Commit fix
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/tutor_assistant/content/repository.py
          git commit -m 'Fix PR 14 SQL projection formatting'
          git push origin HEAD:${{ github.head_ref }}
