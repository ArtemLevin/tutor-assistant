name: PR 15 operational errors

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.head_ref == 'fix/graceful-background-errors' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply operational error patch
        run: python .github/scripts/apply_pr15_operational_errors.py
      - name: Format and validate
        run: |
          python -m pip install --quiet 'ruff>=0.9,<1'
          ruff format \
            src/tutor_assistant/ui/background.py \
            src/tutor_assistant/ui/background_tasks.py \
            src/tutor_assistant/config.py \
            src/tutor_assistant/latex/remote.py \
            src/tutor_assistant/latex/__init__.py \
            src/tutor_assistant/ui/concurrent_app.py \
            src/tutor_assistant/ui/student_content.py \
            tests/test_background_task_coordinator.py \
            tests/test_latex_remote.py \
            tests/test_student_content_gui.py
          ruff check \
            src/tutor_assistant/ui/background.py \
            src/tutor_assistant/ui/background_tasks.py \
            src/tutor_assistant/config.py \
            src/tutor_assistant/latex/remote.py \
            src/tutor_assistant/latex/__init__.py \
            src/tutor_assistant/ui/concurrent_app.py \
            src/tutor_assistant/ui/student_content.py \
            tests/test_background_task_coordinator.py \
            tests/test_latex_remote.py \
            tests/test_student_content_gui.py
          python -m compileall -q src tests
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src tests config/app.example.yaml
          git commit -m 'Handle expected background and transient Git errors'
          git push origin HEAD:${{ github.head_ref }}
