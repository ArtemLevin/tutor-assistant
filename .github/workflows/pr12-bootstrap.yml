name: PR 12 bootstrap

on:
  push:
    branches:
      - fix/background-busy-handling
    paths:
      - ".github/workflows/pr12-bootstrap.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/background-busy-handling
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply PR 12 changes
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import base64
          from pathlib import Path

          def decode(payload: str) -> str:
              return base64.b64decode(payload).decode("utf-8")

          app_path = Path("src/tutor_assistant/ui/app.py")
          app = app_path.read_text(encoding="utf-8")
          old = "from ..content import ContentMaintenanceResult\n"
          new = "from ..content import ContentBusyError, ContentMaintenanceResult\n"
          assert app.count(old) == 1
          app = app.replace(old, new)

          anchor = "from ..transcription_queue import QueueStatus, TranscriptionQueue\n"
          addition = anchor + decode("ZnJvbSAuYmFja2dyb3VuZCBpbXBvcnQgQmFja2dyb3VuZFRhc2tSZXN1bHQsIEJhY2tncm91bmRUYXNrU3RhdGUsIHJ1bl9sYXRleF9tb25pdG9yX3NjYW4K")
          assert app.count(anchor) == 1
          app = app.replace(anchor, addition)

          anchor = "        self._shutdown_ready = False\n"
          addition = (
              anchor
              + "        self._latex_monitor_deferred = False\n"
              + "        self._latex_monitor_deferred_manual = False\n"
          )
          assert app.count(anchor) == 1
          app = app.replace(anchor, addition)

          old = "        scan.clicked.connect(self.scan_remote_latex)\n"
          new = (
              "        scan.clicked.connect(\n"
              "            lambda _checked=False: self.scan_remote_latex(manually_requested=True)\n"
              "        )\n"
          )
          assert app.count(old) == 1
          app = app.replace(old, new)

          start = app.index("    def _content_maintenance_ready(self, result: object) -> None:\n")
          end = app.index("    def _open_student_materials", start)
          app = app[:start] + decode("") + app[end:]

          start = app.index("    def scan_remote_latex(self) -> None:\n")
          end = app.index("    def _operation_failed", start)
          app = app[:start] + decode(" ") + app[end:]

          app_path.write_text(app, encoding="utf-8")

          Path("src/tutor_assistant/ui/background.py").write_text(
              decode(""),
              encoding="utf-8",
          )
          Path("tests/test_background_coordination.py").write_text(
              decode(""),
              encoding="utf-8",
          )

          workflow_path = Path(".github/workflows/windows-content.yml")
          windows = workflow_path.read_text(encoding="utf-8")
          old = '      - "src/tutor_assistant/ui/app.py"\n'
          new = old + '      - "src/tutor_assistant/ui/background.py"\n'
          assert windows.count(old) == 1
          windows = windows.replace(old, new)
          old = '      - "tests/test_latex*.py"\n'
          new = old + '      - "tests/test_background*.py"\n'
          assert windows.count(old) == 1
          windows = windows.replace(old, new)
          old = "          tests/test_latex_remote.py\n"
          new = old + "          tests/test_background_coordination.py\n"
          assert windows.count(old) == 1
          windows = windows.replace(old, new)
          workflow_path.write_text(windows, encoding="utf-8")
          PY
      - name: Install uv
        run: python -m pip install uv
      - name: Install dependencies
        run: uv sync --extra desktop --group dev
      - name: Lint
        run: uv run ruff check src/tutor_assistant/ui/app.py src/tutor_assistant/ui/background.py tests/test_background_coordination.py
      - name: Regression tests
        run: >-
          uv run pytest
          tests/test_background_coordination.py
          tests/test_content_maintenance.py
          tests/test_latex_remote.py
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/tutor_assistant/ui/app.py
          git add src/tutor_assistant/ui/background.py
          git add tests/test_background_coordination.py
          git add .github/workflows/windows-content.yml
          git commit -m "Handle busy background LaTeX monitor"
          git push origin HEAD:fix/background-busy-handling
