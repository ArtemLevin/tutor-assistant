name: PR 13 diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  lint-fix:
    if: github.head_ref == 'refactor/background-task-coordinator'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Install ruff
        run: python -m pip install --quiet "ruff>=0.9,<1"
      - name: Apply verified lint fixes
        run: |
          ruff check . --fix --unsafe-fixes
          ruff check .
      - name: Commit lint fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/tutor_assistant/ui/concurrent_app.py tests/test_background_task_coordinator.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Fix PR 13 lint findings"
          git push origin HEAD:${{ github.head_ref }}
