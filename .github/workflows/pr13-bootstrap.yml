name: PR 13 bootstrap

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/background-task-coordinator'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply service refactor
        run: python scripts/pr13_patch_service.py
      - name: Validate syntax
        run: python -m compileall -q src/tutor_assistant/content src/tutor_assistant/ui/background.py src/tutor_assistant/ui/background_tasks.py
      - name: Commit generated service changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/tutor_assistant/content/service.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Expose non-throwing activity acquisition"
          git push origin HEAD:${{ github.head_ref }}
