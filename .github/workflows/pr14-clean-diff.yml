name: PR 14 clean diff

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  clean-diff:
    if: github.head_ref == 'perf/maintenance-critical-section' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Restore unrelated formatter changes
        shell: bash
        run: |
          git checkout origin/main -- \
            src/tutor_assistant/content/backup.py \
            src/tutor_assistant/content/coordination.py \
            src/tutor_assistant/crm.py \
            src/tutor_assistant/recording/recorder.py \
            src/tutor_assistant/transcript_editing.py \
            src/tutor_assistant/transcription.py \
            src/tutor_assistant/ui/app.py \
            src/tutor_assistant/ui/background_tasks.py \
            src/tutor_assistant/ui/crm.py \
            tests/test_background_task_coordinator.py \
            tests/test_content_coordination.py \
            tests/test_crm.py \
            tests/test_job_status.py \
            tests/test_ui_state.py
      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src tests
          git commit -m 'Remove unrelated PR 14 formatting changes'
          git push origin HEAD:${{ github.head_ref }}
