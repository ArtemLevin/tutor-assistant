# Generated by AgentKit. Re-run `agentkit ci quality install` to refresh.
# agentkit-quality-config-sha256: 32271101464b596b
name: AgentKit Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agentkit-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AGENTKIT_CI_RUN_ID: github-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore AgentKit quality cache
        uses: actions/cache@v4
        with:
          path: .agent/cache
          key: agentkit-quality-${{ runner.os }}-${{ hashFiles('.agent/agentkit.toml', '.strictacode.yml', '.strictacode.yaml', '.strictacode.json') }}
          restore-keys: |
            agentkit-quality-${{ runner.os }}-

      - name: Install AgentKit quality support
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'agent-skills-engineering-kit[quality]'

      - name: Validate AgentKit quality configuration
        run: agentkit ci quality validate

      - name: Run merge-base quality comparison
        id: quality
        continue-on-error: true
        shell: bash
        run: |
          DEFAULT_BASE=main
          BASE_NAME="${GITHUB_BASE_REF:-$DEFAULT_BASE}"
          BASE_REF="origin/$BASE_NAME"
          agentkit ci quality run-local \
            --base-ref "$BASE_REF" \
            --run-id "$AGENTKIT_CI_RUN_ID"

      - name: Publish AgentKit job summary
        if: always()
        shell: bash
        run: |
          agentkit ci quality summary \
            --run-id "$AGENTKIT_CI_RUN_ID" \
            --output "$GITHUB_STEP_SUMMARY" --append

      - name: Upload AgentKit quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentkit-quality-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .agent/state/runs/${{ env.AGENTKIT_CI_RUN_ID }}/ci-artifacts
          if-no-files-found: error
          retention-days: 7

      - name: Enforce AgentKit quality result
        if: always()
        shell: bash
        run: |
          EXIT_FILE=".agent/state/runs/$AGENTKIT_CI_RUN_ID/ci-exit-code"
          if [[ ! -f "$EXIT_FILE" ]]; then
            echo "AgentKit did not produce ci-exit-code" >&2
            exit 2
          fi
          QUALITY_EXIT="$(cat "$EXIT_FILE")"
          exit "$QUALITY_EXIT"
