setup_completed: false
workspace: data
content:
  trash_retention_days: 30
  maintenance_enabled: true
  maintenance_interval_minutes: 30
  auto_repair: true
  auto_purge_trash: true
  auto_cleanup_temporary: true
  temporary_retention_hours: 24
  backup_enabled: true
  backup_interval_hours: 24
  backup_retention_count: 14
students_file: config/students.yaml

recording:
  sample_rate: 48000
  channels: 1
  mic_device: null
  system_device_id: null
  system_backend: soundcard
  chunk_seconds: 30
  diagnostics_seconds: 5
  queue_blocks: 256
  target_sample_rate: 48000
  dual_channel_transcription: true
  require_preflight: true
  silence_warning_seconds: 20
  device_timeout_seconds: 5

whisper:
  model: small
  device: cpu
  compute_type: int8
  language: ru
  beam_size: 1
  vad_filter: true
  cpu_threads: 2
  num_workers: 1

repository:
  students_repo: ../students-26-27
  remote: origin
  base_branch: main
  push: false
  create_branch: true
  use_worktree: true
  keep_worktree: false
  auto_create_pr: true
  repository_full_name: owner/private-students-repo
  pr_base_branch: main

latex:
  enabled: true
  auto_monitor: true
  engine: pdflatex
  latexmk_command: latexmk
  timeout_seconds: 180
  keep_build_files: false
  publish_pdf: true
  max_attempts: 2
  render_preview: true
  preview_dpi: 120
  poll_seconds: 60
  reservation_timeout_minutes: 30
  remote_fetch_attempts: 3
  remote_fetch_backoff_seconds: 0.5

quick_start:
  start_in_quick_mode: true
  default_profile_id: online_lesson
  last_student_id: null
  last_subject: mathematics
  last_topic: ''
  profiles:
    - id: online_lesson
      name: Обычный онлайн-урок
      subject: mathematics
      student_id: null
      auto_transcribe: true
      countdown_seconds: 3
