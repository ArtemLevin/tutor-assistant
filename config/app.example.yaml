workspace: data
students_file: config/students.yaml

recording:
  sample_rate: 48000
  channels: 1
  chunk_seconds: 30
  diagnostics_seconds: 5

whisper:
  model: small
  device: cpu
  compute_type: int8
  language: ru
  beam_size: 1
  vad_filter: true

repository:
  students_repo: ../students-26-27
  remote: origin
  base_branch: main
  push: true
  create_branch: true
  use_worktree: true
  keep_worktree: false

latex:
  enabled: true
  auto_monitor: true
  engine: pdflatex
  latexmk_command: latexmk
  timeout_seconds: 180
  keep_build_files: false
  publish_pdf: true
  max_attempts: 2
  render_preview: true
  preview_dpi: 120
  poll_seconds: 60
